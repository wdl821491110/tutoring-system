services:
  - type: web
    name: tutoring-system
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: IS_CLOUD
        value: "true"
      - key: PORT
        value: "80"
    disk:
      name: tutoring-data
      mountPath: /app/data
      sizeGB: 1
